; Hostinger PHP configuration overrides
; Placed in the root so it applies to all web requests hitting the root index.php
; These override server defaults to prevent 504 Gateway Timeout errors

; Extend PHP execution time (seconds) — default is often 30s
max_execution_time = 300
max_input_time = 300

; Increase memory limit for Filament/Laravel
memory_limit = 256M

; Increase upload limits for file uploads
post_max_size = 64M
upload_max_filesize = 64M

; Session settings
session.gc_maxlifetime = 7200

; OPcache settings for performance
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
opcache.enable_cli = 0
