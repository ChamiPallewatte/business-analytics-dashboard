name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, ctype, xml, json, bcmath

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Create Production .env File
        run: |
          cat << 'EOF' > .env
          APP_NAME="AIWA Accounts Portal"
          APP_ENV=production
          APP_KEY=base64:Dr//fa7uRvBA78A4rhHTCjcMwD5QU44wGVx/Nw95VxU=
          APP_DEBUG=true
          APP_URL=https://bussiness-analytics-dashboard.digitalvortexhub.com

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=debug

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST || 'localhost' }}
          DB_PORT=${{ secrets.DB_PORT || '3306' }}
          DB_DATABASE=${{ secrets.DB_DATABASE || 'u383167570_fcUxOu4hZ' }}
          DB_USERNAME=${{ secrets.DB_USERNAME || 'u383167570_adminuserDB' }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD || 'Smreset123!!!!' }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false

          FILESYSTEM_DISK=uploads
          QUEUE_CONNECTION=database
          CACHE_STORE=database
          EOF

      - name: Clean unnecessary build directories and prepare storage before upload
        run: |
          rm -rf node_modules .git .github
          rm -f bootstrap/cache/config.php bootstrap/cache/routes-v7.php bootstrap/cache/services.php bootstrap/cache/packages.php
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache public/uploads

      - name: Package site into ZIP archive and prepare deploy payload
        run: |
          zip -0 -r deploy.zip . -x "deploy.zip"
          mkdir -p ../deploy_payload
          mv deploy.zip ../deploy_payload/
          cp unzip.php ../deploy_payload/
          rm -rf ./*
          rm -rf .[^.]*
          mv ../deploy_payload/* ./

      - name: Sanitize Host Server Input
        run: |
          RAW_HOST="${{ secrets.HOSTINGER_HOST }}"
          CLEAN_HOST=$(echo "$RAW_HOST" | sed -E 's#^(sftp|ftp|ftps|https?)://##i' | sed -E 's#/+$##')
          echo "HOSTINGER_SERVER_HOST=$CLEAN_HOST" >> $GITHUB_ENV

      - name: Upload ZIP & Extractor via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ env.HOSTINGER_SERVER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          local_path: './*'
          remote_path: 'websites/fcUxOu4hZ/public_html/'
          delete_remote_files: false
          sftp_only: true

      - name: Trigger Web Extraction on Hostinger
        run: |
          echo "Extracting deploy archive on Hostinger..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "https://bussiness-analytics-dashboard.digitalvortexhub.com/unzip.php?key=Dr//fa7uRvBA78A4rhHTCjcMwD5QU44wGVx/Nw95VxU=")
          echo "Server Response: $RESPONSE"
          if [[ "$RESPONSE" == *"SUCCESS"* || "$RESPONSE" == *"HTTP_STATUS:404"* ]]; then
            echo "Extraction completed successfully!"
          else
            echo "Extraction failed!"
            exit 1
          fi



