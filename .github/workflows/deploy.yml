name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, ctype, xml, json, bcmath

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Create Production .env File
        run: |
          cat << 'EOF' > .env
          APP_NAME="AIWA Accounts Portal"
          APP_ENV=production
          APP_KEY=base64:Dr//fa7uRvBA78A4rhHTCjcMwD5QU44wGVx/Nw95VxU=
          APP_DEBUG=false
          APP_URL=https://bussiness-analytics-dashboard.digitalvortexhub.com

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=fcUxOu4hZ
          DB_USERNAME=adminuserDB
          DB_PASSWORD=Smreset123!!!!

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false

          FILESYSTEM_DISK=uploads
          QUEUE_CONNECTION=database
          CACHE_STORE=database
          EOF

      - name: Sanitize Host Server Input
        run: |
          RAW_HOST="${{ secrets.HOSTINGER_HOST }}"
          CLEAN_HOST=$(echo "$RAW_HOST" | sed -E 's#^(sftp|ftp|ftps|https?)://##i' | sed -E 's#/+$##')
          echo "HOSTINGER_SERVER_HOST=$CLEAN_HOST" >> $GITHUB_ENV

      - name: Deploy files via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ env.HOSTINGER_SERVER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          local_path: './*'
          remote_path: 'u383167570/websites/fcUxOu4hZ/public_html/'
          delete_remote_files: false
